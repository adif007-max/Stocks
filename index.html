<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מעקב מניות</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Hebrew:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Hebrew', sans-serif;
    min-height: 100vh;
    margin: 0;
  }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .card-press {
    transition: transform 0.15s, border-color 0.15s;
    cursor: pointer;
  }
  .card-press:active { transform: scale(0.97); }
  .card-press:hover { border-color: #3a3a5a; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'Noto Sans Hebrew', sans-serif;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-family: 'Noto Sans Hebrew', sans-serif;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-ghost:hover { color: var(--text); border-color: #4a4a6a; }
  input[type=text] {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'IBM Plex Mono', monospace;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end;
    z-index: 50;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    width: 100%;
    padding: 24px 20px 36px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .chart-container { position: relative; height: 200px; width: 100%; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .tag-pos { background: rgba(34,197,94,.15); color: #22c55e; }
  .tag-neg { background: rgba(239,68,68,.15);  color: #ef4444; }
  .tag-neu { background: rgba(100,116,139,.15); color: #94a3b8; }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div id="app" class="max-w-md mx-auto px-4 pb-10">

  <!-- Header -->
  <div class="flex items-center justify-between pt-6 pb-4">
    <div>
      <h1 class="text-lg font-semibold tracking-tight">מעקב מניות</h1>
      <p id="last-updated" class="text-xs mt-0.5" style="color:var(--muted)">לא עודכן עדיין</p>
    </div>
    <div class="flex gap-2">
      <button onclick="refreshAll()" class="btn-ghost text-xs px-3 py-2">↻ רענן</button>
      <button onclick="openSettings()" class="btn-ghost text-xs px-3 py-2">⚙</button>
    </div>
  </div>

  <!-- Error banner -->
  <div id="error-banner" class="hidden mb-3 px-4 py-3 rounded-xl text-sm" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5">
    <span id="error-msg"></span>
  </div>

  <!-- Add ticker -->
  <div class="card p-3 mb-4 flex gap-2">
    <input type="text" id="ticker-input" placeholder="הוסף טיקר (AAPL, TSLA...)" maxlength="10"
      style="text-transform:uppercase;flex:1"
      onkeydown="if(event.key==='Enter')addTicker()">
    <button onclick="addTicker()" class="btn-primary text-sm px-4">+</button>
  </div>

  <!-- Ticker list -->
  <div id="ticker-list" class="flex flex-col gap-3"></div>

  <!-- Empty state -->
  <div id="empty-state" class="hidden text-center py-16">
    <div class="text-4xl mb-3">📈</div>
    <p class="text-sm" style="color:var(--muted)">הוסף טיקר להתחלה</p>
  </div>

</div>

<!-- Chart Modal -->
<div id="chart-modal" class="modal-bg hidden" onclick="closeChart(event)">
  <div class="modal" style="max-height:85vh;overflow-y:auto">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h2 id="chart-title" class="text-xl font-semibold mono"></h2>
        <p id="chart-sub" class="text-xs mt-0.5" style="color:var(--muted)">30 ימי מסחר אחרונים</p>
      </div>
      <button onclick="document.getElementById('chart-modal').classList.add('hidden')" class="btn-ghost px-3 py-2">✕</button>
    </div>
    <div class="chart-container mb-2">
      <canvas id="stock-chart"></canvas>
    </div>
    <div id="chart-stats" class="grid grid-cols-3 gap-2 mt-4"></div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-bg hidden" onclick="closeSettings(event)">
  <div class="modal">
    <h2 class="text-base font-semibold mb-1">הגדרות</h2>
    <p class="text-xs mb-4" style="color:var(--muted)">מפתח API מ-finnhub.io — חינמי, 60 בקשות/דקה</p>
    <label class="text-xs mb-1 block" style="color:var(--muted)">Finnhub API Key</label>
    <input type="text" id="api-key-input" placeholder="הדבק את המפתח כאן" dir="ltr" class="mb-4">
    <div class="flex gap-2">
      <button onclick="saveSettings()" class="btn-primary flex-1">שמור</button>
      <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="btn-ghost">ביטול</button>
    </div>
    <p class="text-xs mt-4 text-center">
      <a href="https://finnhub.io/register" target="_blank" style="color:var(--accent2)">קבל מפתח חינמי ←</a>
    </p>
  </div>
</div>

<script>
const DEFAULT_TICKERS = ['SOXL','SPXL','NVDL','QQQ','BITX'];
let chartInstance = null;

function getKey()   { return localStorage.getItem('fh_key') || ''; }
function getTickers(){ return JSON.parse(localStorage.getItem('fh_tickers') || 'null') || DEFAULT_TICKERS; }
function saveTickers(t){ localStorage.setItem('fh_tickers', JSON.stringify(t)); }

function showError(msg) {
  const b = document.getElementById('error-banner');
  const m = document.getElementById('error-msg');
  m.textContent = msg;
  b.classList.remove('hidden');
  setTimeout(() => b.classList.add('hidden'), 6000);
}

function openSettings() {
  document.getElementById('api-key-input').value = getKey();
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings(e) {
  if (e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').classList.add('hidden');
}
function saveSettings() {
  const k = document.getElementById('api-key-input').value.trim();
  if (!k) { showError('נא להזין מפתח API'); return; }
  localStorage.setItem('fh_key', k);
  document.getElementById('settings-modal').classList.add('hidden');
  refreshAll();
}

function closeChart(e) {
  if (e.target === document.getElementById('chart-modal'))
    document.getElementById('chart-modal').classList.add('hidden');
}

async function fhFetch(path) {
  const key = getKey();
  if (!key) { openSettings(); throw new Error('חסר API key'); }
  const res = await fetch(`https://finnhub.io/api/v1${path}&token=${key}`);
  if (res.status === 429) throw new Error('הגעת למגבלת הבקשות (60/דקה) — נסה שוב בעוד דקה');
  if (!res.ok) throw new Error(`שגיאת שרת ${res.status}`);
  return res.json();
}

function renderList() {
  const tickers = getTickers();
  const list = document.getElementById('ticker-list');
  const empty = document.getElementById('empty-state');
  list.innerHTML = '';
  empty.classList.toggle('hidden', tickers.length > 0);

  tickers.forEach(sym => {
    const div = document.createElement('div');
    div.id = `card-${sym}`;
    div.className = 'card card-press p-4';
    div.onclick = () => openChart(sym);
    div.innerHTML = `
      <div class="flex justify-between items-start">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xs font-semibold mono"
            style="background:var(--surface2);border:1px solid var(--border)">${sym.slice(0,4)}</div>
          <div>
            <div class="font-semibold mono text-base">${sym}</div>
            <div id="name-${sym}" class="text-xs" style="color:var(--muted)">טוען...</div>
          </div>
        </div>
        <div class="flex flex-col items-end gap-1">
          <div id="price-${sym}" class="mono font-semibold text-base pulse">—</div>
          <div id="change-${sym}" class="text-xs px-2 py-0.5 rounded-full tag-neu">—</div>
        </div>
      </div>
      <button onclick="event.stopPropagation();removeTicker('${sym}')"
        class="mt-3 text-xs w-full text-center py-1 rounded-lg"
        style="color:var(--muted);background:transparent;border:none;cursor:pointer;opacity:0.5"
        onmouseenter="this.style.opacity='1'" onmouseleave="this.style.opacity='0.5'">
        הסר
      </button>`;
    list.appendChild(div);
    loadQuote(sym);
  });
}

async function loadQuote(sym) {
  try {
    const data = await fhFetch(`/quote?symbol=${sym}`);
    const price = data.c;
    const pct   = data.dp;
    if (!price) { updateCard(sym, null, null, 'לא נמצא'); return; }
    updateCard(sym, price, pct, sym);
  } catch(e) {
    showError(e.message);
    document.getElementById(`name-${sym}`).textContent = 'שגיאה';
    document.getElementById(`price-${sym}`).textContent = '—';
    document.getElementById(`price-${sym}`).classList.remove('pulse');
  }
}

function updateCard(sym, price, pct, name) {
  const priceEl  = document.getElementById(`price-${sym}`);
  const changeEl = document.getElementById(`change-${sym}`);
  const nameEl   = document.getElementById(`name-${sym}`);
  if (!priceEl) return;

  priceEl.classList.remove('pulse');

  if (price === null) {
    priceEl.textContent = '—';
    changeEl.textContent = 'לא נמצא';
    return;
  }

  priceEl.textContent = '$' + price.toFixed(2);
  const pos = pct >= 0;
  const sign = pos ? '+' : '';
  changeEl.textContent = sign + pct.toFixed(2) + '%';
  changeEl.className = `text-xs px-2 py-0.5 rounded-full ${pos ? 'tag-pos' : 'tag-neg'}`;
  priceEl.style.color = pos ? 'var(--green)' : 'var(--red)';
  nameEl.textContent = name || sym;
}

async function openChart(sym) {
  document.getElementById('chart-modal').classList.remove('hidden');
  document.getElementById('chart-title').textContent = sym;
  document.getElementById('chart-stats').innerHTML = '<div class="col-span-3 text-center py-4"><div class="spinner mx-auto"></div></div>';

  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  try {
    const to   = Math.floor(Date.now() / 1000);
    const from = to - 60 * 60 * 24 * 45;
    const data = await fhFetch(`/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${to}`);

    if (data.s !== 'ok' || !data.c?.length) {
      document.getElementById('chart-stats').innerHTML = '<p class="col-span-3 text-center text-sm" style="color:var(--muted)">אין נתונים</p>';
      return;
    }

    const closes = data.c.slice(-30);
    const highs  = data.h.slice(-30);
    const lows   = data.l.slice(-30);
    const times  = data.t.slice(-30).map(t =>
      new Date(t*1000).toLocaleDateString('he-IL',{month:'numeric',day:'numeric'})
    );

    const first = closes[0], last = closes[closes.length-1];
    const totalChg = ((last - first) / first * 100).toFixed(2);
    const high30   = Math.max(...highs).toFixed(2);
    const low30    = Math.min(...lows).toFixed(2);
    const pos      = parseFloat(totalChg) >= 0;

    const ctx = document.getElementById('stock-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: times,
        datasets: [{
          data: closes,
          borderColor: pos ? '#22c55e' : '#ef4444',
          backgroundColor: pos ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)',
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          pointHoverBackgroundColor: pos ? '#22c55e' : '#ef4444',
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1a24',
            borderColor: '#2a2a3a',
            borderWidth: 1,
            titleColor: '#94a3b8',
            bodyColor: '#e2e8f0',
            callbacks: { label: ctx => ' $' + ctx.parsed.y.toFixed(2) }
          }
        },
        scales: {
          x: {
            grid: { color: '#1a1a24' },
            ticks: { color: '#475569', font:{size:10}, maxTicksLimit:6, autoSkip:true }
          },
          y: {
            position: 'left',
            grid: { color: '#1a1a24' },
            ticks: { color: '#475569', font:{size:10}, callback: v => '$'+v.toFixed(0) }
          }
        }
      }
    });

    document.getElementById('chart-stats').innerHTML = `
      <div class="card p-3 text-center">
        <div class="text-xs mb-1" style="color:var(--muted)">מחיר נוכחי</div>
        <div class="mono font-semibold" style="color:${pos?'var(--green)':'var(--red)'}">$${last.toFixed(2)}</div>
      </div>
      <div class="card p-3 text-center">
        <div class="text-xs mb-1" style="color:var(--muted)">שינוי 30י׳</div>
        <div class="mono font-semibold" style="color:${pos?'var(--green)':'var(--red)'}">${pos?'+':''}${totalChg}%</div>
      </div>
      <div class="card p-3 text-center">
        <div class="text-xs mb-1" style="color:var(--muted)">טווח</div>
        <div class="mono text-xs" style="color:var(--text)">$${low30}–$${high30}</div>
      </div>`;

  } catch(e) {
    showError(e.message);
    document.getElementById('chart-modal').classList.add('hidden');
  }
}

function addTicker() {
  const input = document.getElementById('ticker-input');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  if (sym.length > 10) { showError('טיקר לא תקין'); return; }
  const tickers = getTickers();
  if (tickers.includes(sym)) { showError(sym + ' כבר ברשימה'); input.value=''; return; }
  tickers.push(sym);
  saveTickers(tickers);
  input.value = '';
  renderList();
}

function removeTicker(sym) {
  const tickers = getTickers().filter(t => t !== sym);
  saveTickers(tickers);
  renderList();
}

async function refreshAll() {
  document.getElementById('last-updated').textContent = 'מתעדכן...';
  const tickers = getTickers();
  await Promise.allSettled(tickers.map(sym => loadQuote(sym)));
  const now = new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-updated').textContent = 'עודכן ב-' + now;
}

// Init
window.addEventListener('load', () => {
  if (!getKey()) {
    setTimeout(openSettings, 400);
  }
  renderList();
  if (getKey()) refreshAll();
});
</script>
</body>
</html>
