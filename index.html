<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>תיק השקעות</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+Hebrew:wght@300;400;500;600&display=swap');
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a3a;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans Hebrew',sans-serif;min-height:100vh;margin:0}
.mono{font-family:'IBM Plex Mono',monospace}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:13px;font-family:'Noto Sans Hebrew',sans-serif;cursor:pointer;transition:color .15s,border-color .15s}
.btn-ghost:hover{color:var(--text);border-color:#4a4a6a}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-family:'Noto Sans Hebrew',sans-serif;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
input[type=text]{background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;outline:none;transition:border-color .15s;width:100%;font-family:'IBM Plex Mono',monospace}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--muted)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;z-index:50;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;padding:24px 20px 36px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.chart-wrap{position:relative;height:220px;width:100%}
.tag-pos{background:rgba(34,197,94,.15);color:#22c55e;border-radius:6px;padding:2px 8px;font-size:11px}
.tag-neg{background:rgba(239,68,68,.15);color:#ef4444;border-radius:6px;padding:2px 8px;font-size:11px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<div class="max-w-md mx-auto px-4 pb-12">

  <div class="flex items-center justify-between pt-6 pb-3">
    <div>
      <h1 class="text-lg font-semibold">תיק השקעות</h1>
      <p id="last-updated" class="text-xs mt-0.5" style="color:var(--muted)">לא עודכן עדיין</p>
    </div>
    <div class="flex gap-2">
      <button onclick="refreshAll()" id="refresh-btn" class="btn-ghost text-xs px-3">↻ רענן</button>
      <button onclick="openSettings()" class="btn-ghost text-xs px-3">⚙</button>
    </div>
  </div>

  <div id="err" class="hidden mb-3 px-4 py-3 rounded-xl text-sm" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5"></div>

  <!-- KPIs -->
  <div class="grid grid-cols-2 gap-3 mb-4">
    <div class="card p-4">
      <div class="text-xs mb-1" style="color:var(--muted)">שווי תיק (₪)</div>
      <div id="kpi-ils" class="mono text-xl font-semibold pulse" style="color:var(--accent2)">—</div>
      <div id="kpi-rate" class="text-xs mt-1" style="color:var(--muted)">—</div>
    </div>
    <div class="card p-4">
      <div class="text-xs mb-1" style="color:var(--muted)">שווי תיק ($)</div>
      <div id="kpi-usd" class="mono text-xl font-semibold pulse">—</div>
      <div class="text-xs mt-1" style="color:var(--muted)">5 פוזיציות</div>
    </div>
    <div class="card p-4">
      <div class="text-xs mb-1" style="color:var(--muted)">השקעה התחלתית</div>
      <div class="mono text-xl font-semibold" style="color:var(--muted)">₪235,000</div>
      <div class="text-xs mt-1" style="color:var(--muted)">בסיס השוואה</div>
    </div>
    <div class="card p-4" id="kpi-pnl-card">
      <div class="text-xs mb-1" style="color:var(--muted)">רווח / הפסד</div>
      <div id="kpi-pnl" class="mono text-xl font-semibold pulse">—</div>
      <div id="kpi-pnl-pct" class="text-xs mt-1">—</div>
    </div>
  </div>

  <!-- Holdings -->
  <div class="card p-4 mb-4">
    <div class="text-xs font-medium mb-3 uppercase tracking-wider" style="color:var(--muted)">אחזקות</div>
    <div id="holdings-list"></div>
  </div>

  <!-- Historical chart -->
  <div class="card p-4 mb-4">
    <div class="flex justify-between items-center mb-1">
      <div class="text-xs font-medium uppercase tracking-wider" style="color:var(--muted)">שווי תיק לאורך זמן (₪)</div>
      <div class="text-xs" style="color:var(--muted)">אוק׳ 25 — היום</div>
    </div>
    <div class="flex gap-4 mb-3" style="font-size:11px;color:var(--muted)">
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:2px;background:#6366f1;display:inline-block;border-radius:2px"></span>שווי תיק</span>
      <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:2px;background:#ef4444;display:inline-block;border-radius:2px;border-top:2px dashed #ef4444;height:0"></span>בסיס ₪235K</span>
    </div>
    <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
  </div>

  <!-- History table -->
  <div class="card p-4">
    <div class="text-xs font-medium mb-3 uppercase tracking-wider" style="color:var(--muted)">היסטוריה</div>
    <div style="max-height:280px;overflow-y:auto">
      <table style="width:100%;border-collapse:collapse;font-size:11px" class="mono">
        <thead>
          <tr style="color:var(--muted);border-bottom:1px solid var(--border)">
            <th style="padding:5px 4px;text-align:right;font-weight:400">תאריך</th>
            <th style="padding:5px 4px;text-align:center;font-weight:400">שווי ₪</th>
            <th style="padding:5px 4px;text-align:center;font-weight:400">מעלות</th>
            <th style="padding:5px 4px;text-align:center;font-weight:400">מקודם</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Settings -->
<div id="settings-modal" class="modal-bg hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal">
    <h2 class="text-base font-semibold mb-1">הגדרות</h2>
    <p class="text-xs mb-4" style="color:var(--muted)">מפתח API חינמי מ-finnhub.io</p>
    <label class="text-xs mb-1 block" style="color:var(--muted)">Finnhub API Key</label>
    <input type="text" id="api-key-input" placeholder="הדבק מפתח..." dir="ltr" class="mb-4">
    <div class="flex gap-2">
      <button onclick="saveSettings()" class="btn-primary flex-1">שמור</button>
      <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="btn-ghost">ביטול</button>
    </div>
    <p class="text-xs mt-4 text-center">
      <a href="https://finnhub.io/register" target="_blank" style="color:var(--accent2)">קבל מפתח חינמי ←</a>
    </p>
  </div>
</div>

let prices={}, usdNis=3.13;

function getKey(){ return localStorage.getItem('fh_key')||''; }
function showErr(msg){
  const e=document.getElementById('err');
  e.textContent=msg; e.classList.remove('hidden');
  setTimeout(()=>e.classList.add('hidden'),7000);
}
function openSettings(){
  document.getElementById('api-key-input').value=getKey();
  document.getElementById('settings-modal').classList.remove('hidden');
}
function saveSettings(){
  const k=document.getElementById('api-key-input').value.trim();
  if(!k){showErr('נא להזין מפתח');return;}
  localStorage.setItem('fh_key',k);
  document.getElementById('settings-modal').classList.add('hidden');
  refreshAll();
}

async function fhFetch(path){
  const key=getKey();
  if(!key){openSettings();throw new Error('חסר API key');}
  const r=await fetch('https://finnhub.io/api/v1'+path+'&token='+key);
  if(r.status===429) throw new Error('הגעת למגבלת הבקשות (60/דקה) — נסה שוב בעוד דקה');
  if(!r.ok) throw new Error('שגיאת שרת '+r.status);
  return r.json();
}

async function fetchUsdNis(){
  try{
    const d=await fhFetch('/forex/candle?symbol=OANDA:USD_ILS&resolution=D&count=2&');
    if(d&&d.c&&d.c.length) usdNis=d.c[d.c.length-1];
  }catch(e){}
}

function renderHoldings(){
  const list=document.getElementById('holdings-list');
  list.innerHTML='';
  let totalUSD=0;
  HOLDINGS.forEach(h=>{ totalUSD+=(prices[h.sym]||0)*h.qty; });

  HOLDINGS.forEach((h,i)=>{
    const p=prices[h.sym];
    const val=p?p*h.qty:null;
    const pct=val&&totalUSD?(val/totalUSD*100).toFixed(1):'—';
    const row=document.createElement('div');
    row.className='flex items-center justify-between py-2';
    row.style.borderBottom='1px solid var(--border)';
    row.innerHTML=`
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs mono font-semibold"
          style="background:${COLORS[i]}22;color:${COLORS[i]};border:1px solid ${COLORS[i]}44">${h.sym.slice(0,4)}</div>
        <div>
          <div class="mono font-medium text-sm">${h.sym}</div>
          <div class="text-xs" style="color:var(--muted)">${h.qty} יח׳ · ${pct}%</div>
        </div>
      </div>
      <div class="text-right">
        <div class="mono font-medium text-sm">${val?'$'+Math.round(val).toLocaleString():'—'}</div>
        <div class="mono text-xs" style="color:var(--muted)">${p?'$'+p.toFixed(2):'—'}</div>
      </div>`;
    list.appendChild(row);
  });

  const totalILS=totalUSD*usdNis;
  const pnl=totalILS-BASE_ILS;
  const pos=pnl>=0;

  document.getElementById('kpi-ils').textContent=totalUSD>0?'₪'+Math.round(totalILS).toLocaleString():'—';
  document.getElementById('kpi-ils').classList.remove('pulse');
  document.getElementById('kpi-rate').textContent='USD/NIS '+usdNis.toFixed(4);
  document.getElementById('kpi-usd').textContent=totalUSD>0?'$'+Math.round(totalUSD).toLocaleString():'—';
  document.getElementById('kpi-usd').classList.remove('pulse');

  if(totalUSD>0){
    const pe=document.getElementById('kpi-pnl');
    pe.textContent=(pos?'+':'')+Math.round(pnl).toLocaleString()+' ₪';
    pe.style.color=pos?'var(--green)':'var(--red)';
    pe.classList.remove('pulse');
    const pp=document.getElementById('kpi-pnl-pct');
    pp.textContent=(pos?'+':'')+((pnl/BASE_ILS)*100).toFixed(2)+'%';
    pp.style.color=pos?'var(--green)':'var(--red)';
    document.getElementById('kpi-pnl-card').style.background=pos?'rgba(34,197,94,.06)':'rgba(239,68,68,.06)';
  }
}

      datasets:[
        {label:'שווי',data,borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.08)',
          borderWidth:2,pointRadius:0,pointHoverRadius:4,fill:true,tension:0.3,
          pointHoverBackgroundColor:'#6366f1'},
        {label:'בסיס',data:data.map(()=>BASE_ILS),borderColor:'#ef4444',
          borderWidth:1.5,borderDash:[5,4],pointRadius:0,fill:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#1a1a24',borderColor:'#2a2a3a',borderWidth:1,
        titleColor:'#94a3b8',bodyColor:'#e2e8f0',
        callbacks:{label:c=>c.dataset.label==='בסיס'?null:' ₪'+Math.round(c.parsed.y).toLocaleString()}
      }},
      scales:{
        x:{grid:{color:'#1a1a2420'},ticks:{color:'#475569',font:{size:10},maxTicksLimit:8,autoSkip:true}},
        y:{grid:{color:'#1a1a2420'},ticks:{color:'#475569',font:{size:10},callback:v=>'₪'+(v/1000).toFixed(0)+'K'}}
      }
    }
  });
}

function renderHistory(){
  const tb=document.getElementById('history-body');
  tb.innerHTML='';
  [...HISTORY].reverse().forEach(r=>{
    const ab=r.ils>=BASE_ILS, cp=r.ct>=0, pp=r.cp>=0;
    tb.innerHTML+=`<tr style="border-bottom:1px solid #2a2a3a33">
      <td style="padding:5px 4px;text-align:right;color:var(--muted)">${r.d}</td>
      <td style="padding:5px 4px;text-align:center;color:${ab?'var(--green)':'var(--red)'}">₪${Math.round(r.ils).toLocaleString()}</td>
      <td style="padding:5px 4px;text-align:center"><span class="${cp?'tag-pos':'tag-neg'}">${cp?'+':''}${(r.ct*100).toFixed(1)}%</span></td>
      <td style="padding:5px 4px;text-align:center"><span class="${pp?'tag-pos':'tag-neg'}">${pp?'+':''}${(r.cp*100).toFixed(1)}%</span></td>
    </tr>`;
  });
}

async function refreshAll(){
  const btn=document.getElementById('refresh-btn');
  btn.textContent='⏳'; btn.disabled=true;
  try{
    await fetchUsdNis();
    await Promise.allSettled(HOLDINGS.map(async h=>{
      const d=await fhFetch('/quote?symbol='+h.sym);
      if(d&&d.c) prices[h.sym]=d.c;
    }));
    renderHoldings();
    const now=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-updated').textContent='עודכן ב-'+now;
  }catch(e){showErr(e.message);}
  btn.textContent='↻ רענן'; btn.disabled=false;
}

// Init
renderHistChart();
renderHistory();
if(!getKey()) setTimeout(openSettings,400);
else refreshAll();
</script>
</body>
</html>
